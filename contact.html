<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
        }

        header {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
        }

        main {
            max-width: 900px;
            margin: auto;
            padding: 40px;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .contact-box {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .contact-info p {
            margin: 10px 0;
            font-size: 16px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }

        textarea {
            height: 100px;
            resize: none;
        }

        button {
            width: 100%;
            background-color: #2c3e50;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background-color: #1a252f;
        }

        footer {
            text-align: center;
            background-color: #2c3e50;
            color: white;
            padding: 10px;
            margin-top: 40px;
        }

        @media (max-width: 700px) {
            .contact-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

<header>
    <h2>Collaborative Static Website</h2>
</header>

<main>
    <h1>Contact Us</h1>

    <div class="contact-box">

        <div class="contact-info">
            <p><strong>Email:</strong> support@collaborativewebsite.com</p>
            <p><strong>Phone:</strong> +91 98765 43210</p>
            <p><strong>Location:</strong> Tamil Nadu, India</p>
        </div>

        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit">Send Message</button>
        </form>

    </div>
</main>

<footer>
    © 2026 Collaborative Static Website
</footer>

</body>
</html>
